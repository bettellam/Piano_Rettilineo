<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="background:#faf9f6;font-family:Georgia,serif;">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M8 1L2 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- Terra -->
<path d="M90 330 Q250 268 400 276 Q550 284 710 330 L710 400 L90 400 Z" fill="#1D9E75" opacity=".12"/>
<!-- Ellissoide -->
<path d="M90 330 Q250 268 400 276 Q550 284 710 330" fill="none" stroke="#1D9E75" stroke-width="2.5"/>
<!-- Piano topografico -->
<path d="M90 305 Q175 296 260 300 Q340 304 400 264 Q460 232 540 248 Q620 264 710 254"
      fill="none" stroke="#BA7517" stroke-width="2" stroke-dasharray="7 3"/>
<!-- Griglia UTM -->
<line x1="90" y1="314" x2="710" y2="260" stroke="#E24B4A" stroke-width="2"/>
<!-- Piano rettilineo -->
<line x1="90" y1="276" x2="710" y2="276" stroke="#7F77DD" stroke-width="2.5"/>
<!-- Punti A B O -->
<circle cx="190" cy="276" r="5" fill="#7F77DD"/>
<circle cx="610" cy="276" r="5" fill="#7F77DD"/>
<circle cx="400" cy="276" r="6" fill="#7F77DD" opacity=".5"/>
<text x="190" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F77DD">A</text>
<text x="610" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F77DD">B</text>
<text x="400" y="265" text-anchor="middle" font-size="11" fill="#7F77DD">O (origine)</text>
<!-- linee verticali -->
<line x1="190" y1="280" x2="190" y2="332" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="610" y1="280" x2="610" y2="332" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3 2"/>
<!-- bracket d_PR -->
<line x1="190" y1="168" x2="610" y2="168" stroke="#7F77DD" stroke-width="2" marker-end="url(#a)" marker-start="url(#ar)"/>
<line x1="190" y1="162" x2="190" y2="174" stroke="#7F77DD" stroke-width="1.5"/>
<line x1="610" y1="162" x2="610" y2="174" stroke="#7F77DD" stroke-width="1.5"/>
<rect x="320" y="156" width="160" height="20" rx="3" fill="#faf9f6"/>
<text x="400" y="168" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#7F77DD">d_PR = d_UTM / K</text>
<!-- bracket d_UTM -->
<line x1="190" y1="200" x2="618" y2="200" stroke="#E24B4A" stroke-width="2" marker-end="url(#a)" marker-start="url(#ar)"/>
<line x1="190" y1="194" x2="190" y2="206" stroke="#E24B4A" stroke-width="1.5"/>
<line x1="618" y1="194" x2="618" y2="206" stroke="#E24B4A" stroke-width="1.5"/>
<rect x="316" y="188" width="168" height="20" rx="3" fill="#faf9f6"/>
<text x="400" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#E24B4A">d_UTM  &gt;  d_PR</text>
<!-- bracket d_topo -->
<line x1="190" y1="232" x2="602" y2="232" stroke="#BA7517" stroke-width="2" marker-end="url(#a)" marker-start="url(#ar)"/>
<line x1="190" y1="226" x2="190" y2="238" stroke="#BA7517" stroke-width="1.5"/>
<line x1="602" y1="226" x2="602" y2="238" stroke="#BA7517" stroke-width="1.5"/>
<rect x="306" y="220" width="188" height="20" rx="3" fill="#faf9f6"/>
<text x="400" y="232" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#BA7517">d_terreno  ≈  d_PR</text>
<!-- quota h -->
<line x1="668" y1="276" x2="668" y2="306" stroke="#1D9E75" stroke-width="1" marker-end="url(#a)" marker-start="url(#ar)"/>
<text x="680" y="294" font-size="12" fill="#1D9E75">h</text>
<!-- legenda -->
<rect x="22" y="30" width="212" height="116" rx="6" fill="#f2f0eb" stroke="#d8d4cc" stroke-width="0.5"/>
<text x="36" y="52" font-size="12" font-weight="bold" fill="#1a1814">Piani di riferimento</text>
<line x1="36" y1="70" x2="60" y2="70" stroke="#7F77DD" stroke-width="2.5"/>
<text x="68" y="74" font-size="11" fill="#5a5750">Piano rettilineo locale</text>
<line x1="36" y1="90" x2="60" y2="90" stroke="#E24B4A" stroke-width="2"/>
<text x="68" y="94" font-size="11" fill="#5a5750">Griglia UTM</text>
<line x1="36" y1="110" x2="60" y2="110" stroke="#BA7517" stroke-width="2" stroke-dasharray="7 3"/>
<text x="68" y="114" font-size="11" fill="#5a5750">Piano topografico</text>
<line x1="36" y1="130" x2="60" y2="130" stroke="#1D9E75" stroke-width="2.5"/>
<text x="68" y="134" font-size="11" fill="#5a5750">Ellissoide GRS80</text>
<!-- formula K -->
<rect x="548" y="30" width="234" height="76" rx="6" fill="#f2f0eb" stroke="#d8d4cc" stroke-width="0.5"/>
<text x="562" y="54" font-size="13" font-weight="bold" fill="#1a1814">K = k_proj · k_h</text>
<text x="562" y="74" font-size="11" fill="#5a5750">k_proj = f(E − mer. centrale)</text>
<text x="562" y="92" font-size="11" fill="#5a5750">k_h = R / (R + h)</text>
<!-- titolo -->
<text x="400" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1814">Confronto piani di riferimento geodetico</text>
<!-- nota -->
<text x="400" y="390" text-anchor="middle" font-size="9" fill="#999">d_terreno &lt; d_PR ≤ d_UTM — Veneto: K ≈ 1.00014 · correzione ≈ 14 cm/km</text>
</svg>
