<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" style="background:#faf9f6;font-family:Georgia,serif;">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M8 1L2 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- titolo -->
<text x="400" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1814">Confronto distanze A→B sui tre piani (distorsione ×20 per visibilità)</text>
<!-- Terra fill -->
<path d="M110 258 Q270 200 400 208 Q530 216 690 258 L690 320 L110 320 Z" fill="#1D9E75" opacity=".12"/>
<!-- Ellissoide -->
<path d="M110 258 Q270 200 400 208 Q530 216 690 258" fill="none" stroke="#1D9E75" stroke-width="2.5"/>
<!-- Piano topografico -->
<path d="M110 234 Q190 225 270 229 Q340 233 400 196 Q460 168 530 182 Q600 196 690 188"
      fill="none" stroke="#BA7517" stroke-width="2" stroke-dasharray="6 3"/>
<!-- Griglia UTM -->
<line x1="110" y1="244" x2="690" y2="198" stroke="#E24B4A" stroke-width="2"/>
<!-- Piano rettilineo -->
<line x1="110" y1="208" x2="690" y2="208" stroke="#7F77DD" stroke-width="2.5"/>
<!-- Punti A e B -->
<circle cx="160" cy="208" r="6" fill="#7F77DD" stroke="#fff" stroke-width="2"/>
<circle cx="640" cy="208" r="6" fill="#7F77DD" stroke="#fff" stroke-width="2"/>
<text x="160" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F77DD">A</text>
<text x="640" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F77DD">B</text>
<!-- linee verticali -->
<line x1="160" y1="212" x2="160" y2="260" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="640" y1="212" x2="640" y2="260" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 2"/>
<!-- ── bracket d_PR ── -->
<line x1="160" y1="80" x2="640" y2="80" stroke="#7F77DD" stroke-width="2.5" marker-end="url(#a)" marker-start="url(#ar)"/>
<line x1="160" y1="74" x2="160" y2="86" stroke="#7F77DD" stroke-width="2"/>
<line x1="640" y1="74" x2="640" y2="86" stroke="#7F77DD" stroke-width="2"/>
<rect x="334" y="68" width="132" height="20" rx="3" fill="#faf9f6"/>
<text x="400" y="78" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#7F77DD">d_PR  (corretto)</text>
<!-- ── bracket d_UTM ── (K×20 visual ≈ +2.5%) -->
<line x1="160" y1="114" x2="652" y2="114" stroke="#E24B4A" stroke-width="2.5" marker-end="url(#a)" marker-start="url(#ar)"/>
<line x1="160" y1="108" x2="160" y2="120" stroke="#E24B4A" stroke-width="2"/>
<line x1="652" y1="108" x2="652" y2="120" stroke="#E24B4A" stroke-width="2"/>
<rect x="328" y="102" width="144" height="20" rx="3" fill="#faf9f6"/>
<text x="400" y="112" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#E24B4A">d_UTM  &gt;  d_PR</text>
<!-- barra delta -->
<rect x="640" y="108" width="12" height="12" fill="#E24B4A" opacity=".4" rx="1"/>
<text x="658" y="118" font-size="10" fill="#E24B4A">Δ ≈ 14 cm/km*</text>
<!-- ── bracket d_terreno ── -->
<line x1="160" y1="148" x2="628" y2="148" stroke="#BA7517" stroke-width="2.5" marker-end="url(#a)" marker-start="url(#ar)"/>
<line x1="160" y1="142" x2="160" y2="154" stroke="#BA7517" stroke-width="2"/>
<line x1="628" y1="142" x2="628" y2="154" stroke="#BA7517" stroke-width="2"/>
<rect x="314" y="136" width="172" height="20" rx="3" fill="#faf9f6"/>
<text x="400" y="146" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#BA7517">d_terreno  ≈  d_PR</text>
<!-- etichette piani -->
<text x="102" y="212" text-anchor="end" font-size="11" fill="#7F77DD">Piano rett.</text>
<text x="102" y="232" text-anchor="end" font-size="11" fill="#E24B4A">UTM</text>
<text x="102" y="252" text-anchor="end" font-size="11" fill="#BA7517">Topo.</text>
<text x="102" y="272" text-anchor="end" font-size="11" fill="#1D9E75">Elliss.</text>
<!-- nota -->
<text x="400" y="308" text-anchor="middle" font-size="9" fill="#999">* distorsione ×20 per visibilità grafica — valore reale zona Padova: K ≈ 1.000186 → Δ ≈ 14 cm / 1 km</text>
</svg>
